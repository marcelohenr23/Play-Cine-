<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAYCINE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- TELA DE AUTENTICAÇÃO (LOGIN / CADASTRO) -->
    <div id="authScreen" class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">PLAYCINE</div>
            
            <!-- Formulário de Login -->
            <form id="loginForm">
                <h2>Entrar na sua conta</h2>
                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" id="loginEmail" required>
                </div>
                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="auth-btn">Entrar</button>
                <div class="auth-switch">
                    Não tem uma conta? <a href="#" id="showRegister">Cadastre-se</a>
                </div>
            </form>

            <!-- Formulário de Cadastro (Oculto inicialmente) -->
            <form id="registerForm" style="display: none;">
                <h2>Criar uma conta</h2>
                <div class="input-group">
                    <label>Nome</label>
                    <input type="text" id="regName" required>
                </div>
                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" id="regPassword" required>
                </div>
                <button type="submit" class="auth-btn">Cadastrar</button>
                <div class="auth-switch">
                    Já tem uma conta? <a href="#" id="showLogin">Entrar</a>
                </div>
            </form>
        </div>
    </div>

    <!-- TELA DE SELEÇÃO DE PERFIS -->
    <div id="profileScreen" class="profile-screen-container" style="display: none;">
        <h1>Quem está assistindo?</h1>
        <div id="profilesGrid" class="profiles-grid">
            <!-- Gerado via JS -->
        </div>
        <button id="btnAddProfileModal" class="manage-profiles-btn">Adicionar Perfil</button>
    </div>

    <!-- MODAL DE CRIAR/EDITAR PERFIL -->
    <div id="profileModal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modalProfileTitle">Novo Perfil</h3>
            <div class="input-group">
                <label>Nome do Perfil</label>
                <input type="text" id="newProfileName" placeholder="Ex: João">
            </div>
            <div class="input-group">
                <label>Escolha o Avatar</label>
                <div id="avatarSelectorGrid" class="avatar-selector-grid">
                    <!-- Avatares gerados via JS -->
                </div>
            </div>
            <div class="modal-buttons">
                <button id="saveProfileBtn" class="modal-btn primary">Salvar</button>
                <button id="cancelProfileBtn" class="modal-btn secondary">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- MODAL DE MENSAGENS / ALERTAS -->
    <div id="customModal" class="modal-overlay">
        <div class="modal-content" style="text-align: center;">
            <p id="modalMessage" style="margin-bottom: 20px; font-size: 16px;"></p>
            <button id="modalCloseBtn" class="modal-btn primary">OK</button>
        </div>
    </div>

    <!-- SITE PRINCIPAL (CATÁLOGO DE FILMES) -->
    <div id="mainSite" class="main-site">
        <header>
            <div class="logo">PLAYCINE</div>
            <div class="header-right">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Pesquisar filmes...">
                </div>
                <div id="activeProfileBadge" class="active-profile-badge" title="Trocar Perfil">
                    <img id="activeProfileAvatarImg" src="" alt="Perfil">
                    <span id="currentProfileNameText">Perfil</span>
                </div>
            </div>
        </header>

        <section class="categories">
            <button class="cat-btn active" data-category="all">Todos</button>
            <button class="cat-btn" data-category="Ação">Ação</button>
            <button class="cat-btn" data-category="Romance">Romance</button>
            <button class="cat-btn" data-category="Séries">Séries</button>
        </section>

        <main class="catalog">
            <h2>Em Alta</h2>
            <div id="movieGrid" class="movie-grid">
                <!-- Filmes injetados via JS -->
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
