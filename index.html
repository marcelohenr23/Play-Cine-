<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineBox - Seu Portal de Filmes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Cabeçalho Principal -->
    <header class="main-header">
        <div class="logo">
            <h1>Cine<span>Box</span></h1>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Pesquisar filme ou gênero...">
        </div>
    </header>

    <!-- Seção de Destaque (Hero) -->
    <section class="hero">
        <div class="hero-content">
            <h2>Filmes Incríveis para Assistir Agora</h2>
            <p>Explore os melhores títulos, lançamentos e clássicos na palma da sua mão.</p>
            <button class="btn-primary" id="btnCatalog">Ver Catálogo</button>
        </div>
    </section>

    <!-- Seção de Categorias / Filtros Rápidos -->
    <nav class="categories-nav">
        <button class="cat-btn active" data-category="all">Todos</button>
        <button class="cat-btn" data-category="Ação">Ação</button>
        <button class="cat-btn" data-category="Terror">Terror</button>
        <button class="cat-btn" data-category="Ficção">Ficção</button>
        <button class="cat-btn" data-category="Romance">Romance</button>
    </nav>

    <!-- Seção Principal do Catálogo de Filmes -->
    <main class="container">
        <h2>Catálogo de Filmes</h2>
        <div class="movie-grid" id="movieGrid">
            <!-- Os cards dos filmes serão injetados aqui pelo JavaScript -->
        </div>
    </main>

    <!-- Rodapé -->
    <footer>
        <p>&copy; 2026 CineBox. Todos os direitos reservados.</p>
    </footer>

    <!-- Arquivo de Lógica -->
    <script src="script.js"></script>
</body>
</html>
